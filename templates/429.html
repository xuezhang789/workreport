{% extends "base_topbar.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6 text-center">
        <h1 class="text-2xl font-bold text-red-600 mb-4">429 - Too Many Requests</h1>
        <p class="text-gray-700 mb-6">{{ message|default:"请求过于频繁，请稍后再试 / Too many requests, please try again later" }}</p>
        <a href="/" class="inline-block bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
            返回首页 / Back to Home
        </a>
    </div>
</div>
{% endblock %}
