{% extends "registration/auth_base.html" %}

{% block title %}已退出 / Logged Out{% endblock %}

{% block extra_styles %}
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 text-center">
                <div class="mb-4 text-success">
                    <i class="bi bi-check-circle display-1"></i>
                </div>
                <h4 class="card-title mb-3">已注销 / Logged Out</h4>
                <p class="card-text text-muted mb-4">您已成功退出登录。 / You have successfully logged out.</p>
                
                <div class="d-grid">
                    <a href="{% url 'core:login' %}" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right me-2"></i>重新登录 / Login Again
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
{% endblock %}
