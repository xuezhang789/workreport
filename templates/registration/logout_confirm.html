{% extends "registration/auth_base.html" %}

{% block title %}注销确认 / Confirm Logout{% endblock %}

{% block extra_styles %}
<style>
    .confirm-content {
        text-align: center;
    }
    .warning-icon {
        width: 64px;
        height: 64px;
        background: #fef2f2;
        color: #ef4444;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
    }
    .action-row {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 32px;
    }
    .btn-danger {
        background: #ef4444;
        color: white;
        border: none;
    }
    .btn-danger:hover {
        background: #dc2626;
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
    }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 text-center">
                <div class="mb-4 text-danger">
                    <i class="bi bi-box-arrow-right display-1"></i>
                </div>
                <h4 class="card-title mb-3">注销确认 / Confirm Logout</h4>
                <p class="card-text text-muted mb-4">您确定要退出登录吗？ / Are you sure you want to log out?</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg">
                            <i class="bi bi-box-arrow-right me-2"></i>确认退出 / Confirm Logout
                        </button>
                        <a href="{% url 'workbench' %}" class="btn btn-light btn-lg">
                            取消 / Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
