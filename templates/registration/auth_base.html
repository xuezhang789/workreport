<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}WorkReport{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mobile optimization for auth pages */
        input {
            font-size: 16px !important; /* Prevent iOS zoom */
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg">
        <div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900">
                WorkReport
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                {% block subtitle %}工作日报管理系统 / Work Report System{% endblock %}
            </p>
        </div>
        
        {% if messages %}
        <div class="space-y-2">
            {% for message in messages %}
            <div class="p-4 rounded-md {% if message.tags == 'error' %}bg-red-50 text-red-700{% else %}bg-green-50 text-green-700{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}
        {% endblock %}
        
        <div class="mt-6 text-center">
            <p class="text-xs text-gray-400">
                &copy; {% now "Y" %} WorkReport. All rights reserved.
            </p>
        </div>
    </div>
</body>
</html>
