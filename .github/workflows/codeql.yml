name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '21 3 * * 1'

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/analyze@v3
